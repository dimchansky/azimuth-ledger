name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker build --target test .

      - name: Build
        run: |
          docker build --target build -t azimuth-ledger-build .
          docker create --name azimuth-ledger-tmp azimuth-ledger-build
          docker cp azimuth-ledger-tmp:/app/dist ./dist
          docker rm azimuth-ledger-tmp

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
